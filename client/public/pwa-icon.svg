<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1f14"/>
      <stop offset="100%" stop-color="#0d2b1a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="175" fill="none" stroke="#4ade80" stroke-width="6" opacity="0.25"/>
  <!-- Checkmark circle -->
  <circle cx="256" cy="256" r="148" fill="none" stroke="url(#glow)" stroke-width="18" stroke-linecap="round"/>
  <!-- Checkmark tick -->
  <polyline
    points="178,256 230,310 338,200"
    fill="none"
    stroke="url(#glow)"
    stroke-width="26"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Sparkle dot top-right -->
  <circle cx="368" cy="142" r="12" fill="#86efac" opacity="0.8"/>
  <circle cx="392" cy="162" r="6" fill="#4ade80" opacity="0.5"/>
</svg>
