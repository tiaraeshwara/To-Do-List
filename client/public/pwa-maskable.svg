<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0a1f14" />
            <stop offset="100%" stop-color="#0d2b1a" />
        </linearGradient>
        <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#86efac" />
            <stop offset="100%" stop-color="#4ade80" />
        </linearGradient>
    </defs>
    <!-- Full-bleed background (maskable icons need full coverage) -->
    <rect width="512" height="512" fill="url(#bg)" />
    <!-- Checkmark circle (scaled inward for safe zone ~60%) -->
    <circle cx="256" cy="256" r="130" fill="none" stroke="url(#glow)" stroke-width="16" />
    <!-- Checkmark tick -->
    <polyline
        points="192,256 240,304 326,208"
        fill="none"
        stroke="url(#glow)"
        stroke-width="22"
        stroke-linecap="round"
        stroke-linejoin="round"
    />
</svg>